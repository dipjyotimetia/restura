# .gitlab-ci.yml
stages:
  - test

api-tests:
  stage: test
  image: node:22
  script:
    - npm install -g @restura/cli
    - restura run ./api-tests --env ./api-tests/env.ci.yaml --reporter junit --output junit.xml
  variables:
    # Secrets injected as CI/CD variables; env file references via ${VAR}.
    API_TOKEN: $API_TOKEN
  artifacts:
    when: always
    reports:
      junit: junit.xml
    paths:
      - junit.xml
