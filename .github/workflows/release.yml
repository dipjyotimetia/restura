name: Release

# Every merge to main creates a new tag and GitHub release.
#
# Flow:
#   1. Determine next semver from conventional-commit messages since the last
#      tag (feat → minor, feat!/BREAKING CHANGE → major, anything else → patch).
#   2. Bump root + every workspace's package.json to that version.
#   3. Commit the bump as `chore(release): vX.Y.Z` and push it back to main.
#   4. Create + push the `vX.Y.Z` tag.
#   5. Generate a CycloneDX SBOM for the production dep tree.
#   6. Cut a GitHub release with auto-generated notes + the SBOM attached.
#
# Loop safety: the bump commit + tag are pushed with the default GITHUB_TOKEN,
# which by design does NOT re-trigger workflows. The `chore(release):` prefix
# guard is belt-and-suspenders in case anyone swaps in a PAT later.

on:
  push:
    branches: [main]

concurrency:
  # Never cancel an in-flight release — partial state (bumped commit without a
  # tag, or a tag without a release) is much worse than queueing.
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Tag + release
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          # full history so the bump action can read every prior tag
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine next version
        id: bump
        # anothrNick is a Docker action — Linux runners only (we're on ubuntu-latest).
        # Inputs go via env: rather than with:. Pinned to a tagged release, not @v1,
        # so we don't silently track upstream breakage.
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          TAG_PREFIX: v
          RELEASE_BRANCHES: main
          # Let *this* workflow do the actual tag push (after the version-bump commit),
          # so we don't end up with a tag that points at the pre-bump commit.
          DRY_RUN: 'true'

      - name: Configure git author
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Bump root + workspace versions
        env:
          # anothrNick exposes new_tag (e.g. v1.2.3) but no stripped version,
          # so we strip the prefix here for npm version.
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: |
          NEW_VERSION="${NEW_TAG#v}"
          npm version "$NEW_VERSION" \
            --no-git-tag-version \
            --workspaces \
            --include-workspace-root \
            --allow-same-version

      - name: Commit, tag, push
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: |
          set -euo pipefail
          git add package.json package-lock.json cli/package.json
          if git diff --staged --quiet; then
            echo "No version changes to commit (already at ${NEW_TAG})."
          else
            git commit -m "chore(release): ${NEW_TAG}"
          fi
          # Handle the rare case where another commit landed during the run.
          git pull --rebase origin main
          git push origin HEAD:main
          git tag -a "${NEW_TAG}" -m "${NEW_TAG}"
          git push origin "${NEW_TAG}"

      - name: Generate CycloneDX SBOM
        run: |
          # --package-lock-only: read the dep graph from package-lock.json
          # instead of node_modules, so no separate prod-only install is
          # needed (and we sidestep the electron-builder postinstall issue).
          # --omit dev: keep devDeps out of the production SBOM.
          npx --yes @cyclonedx/cyclonedx-npm@2 \
            --package-lock-only --omit dev \
            --output-format JSON --output-file restura.cdx.json
          npx --yes @cyclonedx/cyclonedx-npm@2 \
            --package-lock-only --omit dev \
            --output-format XML --output-file restura.cdx.xml

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: ${{ steps.bump.outputs.new_tag }}
          # GitHub generates "## What's Changed" + its own "**Full Changelog**"
          # link from PR history. `body` is prepended to that, so we only put
          # the bits the generator doesn't know about (SBOM attachment note).
          generate_release_notes: true
          body: |
            A CycloneDX SBOM of the production dependency tree is attached
            (`restura.cdx.json` / `.xml`).
          files: |
            restura.cdx.json
            restura.cdx.xml
