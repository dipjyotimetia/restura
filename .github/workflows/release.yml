name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # - os: macos-latest
          #   platform: mac
          # - os: windows-latest
          #   platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: |
          npm run type-check
          npx tsc --noEmit -p electron/tsconfig.json

      - name: Run tests
        run: npm run test:run

      # # ── macOS ────────────────────────────────────────────────────────────────
      # - name: Build and publish (macOS)
      #   if: matrix.platform == 'mac'
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     # Code signing — set CSC_LINK to a base64-encoded .p12 certificate
      #     CSC_LINK: ${{ secrets.CSC_LINK }}
      #     CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
      #     # Notarization — required for Gatekeeper on macOS 10.15+
      #     APPLE_ID: ${{ secrets.APPLE_ID }}
      #     APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      #     APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      #   run: npm run electron:publish:mac

      # # ── Windows ──────────────────────────────────────────────────────────────
      # - name: Build and publish (Windows)
      #   if: matrix.platform == 'win'
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     # Code signing — set WIN_CSC_LINK to a base64-encoded .p12 certificate
      #     WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
      #     WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
      #   run: npm run electron:publish:win

      # ── Linux ────────────────────────────────────────────────────────────────
      - name: Build and publish (Linux)
        if: matrix.platform == 'linux'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run electron:publish:linux
