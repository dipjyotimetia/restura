name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release:
    name: Version + publish via Changesets
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
      pull-requests: write
      id-token: write # for npm provenance, if/when we publish to npm
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        run: npm run --workspace @restura/cli build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          # `version` updates package versions + CHANGELOG.md and opens a PR.
          # `publish` runs only after that PR merges (no pending changesets remain).
          version: npm run changeset:version
          publish: npm run changeset:publish
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # NPM_TOKEN only required once we start publishing @restura/cli to npm.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
