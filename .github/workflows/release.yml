name: Release

# Manually dispatched — a release is NEVER cut automatically on merge to main.
# Run it from the Actions tab ("Release" → "Run workflow", on the main branch)
# or via `gh workflow run release.yml --ref main` when you want to ship.
#
# Inputs:
#   release_bump             — semver bump to release: patch, minor, or major.
#                             Defaults to patch.
#   prerelease              — when true, publishes a GitHub prerelease (beta).
#                             Skips Docker, npm CLI, and Cloudflare deploys.
#   prerelease_identifier   — appended to the next stable semver to form the
#                             prerelease tag (e.g. "beta.1" → v0.2.16-beta.1).
#                             Increment for successive betas (beta.2, beta.3…).
#   publish_docker          — opt-in (default false). When true on a stable
#                             release, publishes the Docker image to GHCR.
#
# Flow (stable):
#   1. Preflight validates main, inputs, tests, type-checks, and build health.
#   2. Determine next semver from the selected release_bump input.
#   3. Bump root + every workspace's package.json to that version.
#   4. Commit the bump as `chore(release): vX.Y.Z` and push to main.
#   5. Create + push the `vX.Y.Z` tag (points at the bump commit).
#   6. Generate structured release notes from conventional commits (git-cliff).
#   7. Generate a CycloneDX SBOM. Cut a draft GitHub release with notes + SBOM.
#
# Flow (prerelease / beta):
#   1–2. Same version determination; actual tag = vX.Y.Z-{identifier}.
#   3. Tag current HEAD and push — main is NOT touched (no bump commit).
#      Each desktop runner bumps its local package.json before building so the
#      packaged app reports the correct beta version (About, app.getVersion()).
#   4–6. Same notes/SBOM/release steps; GitHub release marked prerelease=true.
#
# Downstream jobs fan out from `release`:
#   - `desktop`      — build + publish Electron installers (all releases).
#   - `publish-cli`  — publish `restura-cli` to npm (stable only).
#   - `publish-docker` — publish Docker image to GHCR (stable + publish_docker opt-in).
#   - `deploy-web`   — deploy to Cloudflare (stable only).
#
# Note: the bump commit + tag are pushed with the default GITHUB_TOKEN. Because
# the only trigger is workflow_dispatch, that push can't re-enter this workflow.
#
# Recovery after a failed run (stable): the bump commit + tag are pushed to main
# BEFORE the desktop/publish/deploy jobs run, so if one of those fails the GitHub
# release stays a draft but main already carries `chore(release): vX.Y.Z` + tag.
# A plain re-run is then refused by "Validate tag does not exist". To retry:
#   1. Delete the draft release:  gh release delete vX.Y.Z --cleanup-tag --yes
#      (or `gh release delete vX.Y.Z --yes` then `git push origin :refs/tags/vX.Y.Z`)
#   2. Revert the bump commit on main if you do NOT want to keep that version.
#   3. Re-dispatch the release.

on:
  workflow_dispatch:
    inputs:
      release_bump:
        description: 'Semver bump to release'
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch
      prerelease:
        description: 'Publish as a prerelease (beta)'
        type: boolean
        default: false
      prerelease_identifier:
        description: 'Pre-release identifier appended to the next stable version (e.g. beta.1, beta.2). Only used when prerelease=true.'
        type: string
        default: 'beta.1'
      publish_docker:
        description: 'Publish the Docker image to GHCR (stable releases only). Off by default — tick to opt in.'
        type: boolean
        default: false

concurrency:
  # Never cancel an in-flight release — partial state (bumped commit without a
  # tag, or a tag without a release) is much worse than queueing.
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  preflight:
    name: Release preflight
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - name: Require main branch
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF}" != "refs/heads/main" ]; then
            echo "Release must be dispatched from main; got ${GITHUB_REF}."
            exit 1
          fi

      - name: Validate release inputs
        env:
          RELEASE_BUMP: ${{ inputs.release_bump }}
          PRERELEASE: ${{ inputs.prerelease }}
          PRERELEASE_IDENTIFIER: ${{ inputs.prerelease_identifier }}
        run: |
          set -euo pipefail
          case "$RELEASE_BUMP" in
            patch|minor|major) ;;
            *)
              echo "release_bump must be patch, minor, or major; got '${RELEASE_BUMP}'."
              exit 1
              ;;
          esac

          if [ "$PRERELEASE" = "true" ]; then
            if ! [[ "$PRERELEASE_IDENTIFIER" =~ ^[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*$ ]]; then
              echo "prerelease_identifier must be a dot-separated semver prerelease identifier; got '${PRERELEASE_IDENTIFIER}'."
              exit 1
            fi
          fi

      - name: Validate stable release secrets
        if: ${{ !inputs.prerelease }}
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WORKER_PROXY_TOKEN: ${{ secrets.WORKER_PROXY_TOKEN }}
        run: |
          set -euo pipefail
          missing=()
          for name in NPM_TOKEN CLOUDFLARE_API_TOKEN CLOUDFLARE_ACCOUNT_ID WORKER_PROXY_TOKEN; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing required stable release secret(s): %s\n' "${missing[*]}"
            exit 1
          fi

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Validate application
        env:
          ELECTRON_OVERRIDE_DIST_PATH: /tmp
        run: npm run validate

      - name: Validate release build surfaces
        env:
          ELECTRON_OVERRIDE_DIST_PATH: /tmp
        run: |
          set -euo pipefail
          npx tsc --noEmit -p electron/tsconfig.json
          npx tsc --noEmit -p worker/tsconfig.json
          npx tsc --noEmit -p echo/tsconfig.json
          npm run --workspace cli type-check
          npm run build -w cli
          npm run electron:compile

  release:
    name: Tag + release
    needs: [preflight]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      # The actual published tag — includes prerelease suffix when applicable.
      # Consumed by downstream jobs so they check out the right commit.
      actual_tag: ${{ steps.tag.outputs.actual_tag }}
    steps:
      - uses: actions/checkout@v7
        with:
          # full history so the bump action can read every prior tag
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Determine next version
        id: bump
        # anothrNick is a Docker action — Linux runners only (we're on ubuntu-latest).
        # Inputs go via env: rather than with:. Pinned to a tagged release, not @v1,
        # so we don't silently track upstream breakage.
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: ${{ inputs.release_bump }}
          TAG_PREFIX: v
          RELEASE_BRANCHES: main
          # Let *this* workflow do the actual tag push (after the version-bump commit),
          # so we don't end up with a tag that points at the pre-bump commit.
          DRY_RUN: 'true'

      - name: Compute actual tag
        id: tag
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
          PRERELEASE: ${{ inputs.prerelease }}
          PRERELEASE_IDENTIFIER: ${{ inputs.prerelease_identifier }}
        run: |
          ACTUAL_TAG="$NEW_TAG"
          if [ "$PRERELEASE" = "true" ]; then
            ACTUAL_TAG="${NEW_TAG}-${PRERELEASE_IDENTIFIER}"
          fi
          echo "actual_tag=$ACTUAL_TAG" >> "$GITHUB_OUTPUT"
          echo "Releasing: $ACTUAL_TAG (prerelease=$PRERELEASE)"

      - name: Validate tag does not exist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACTUAL_TAG: ${{ steps.tag.outputs.actual_tag }}
        run: |
          set -euo pipefail
          if ! [[ "$ACTUAL_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$ ]]; then
            echo "Computed tag is not a valid semver tag: ${ACTUAL_TAG}"
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/${ACTUAL_TAG}" >/dev/null; then
            echo "Tag ${ACTUAL_TAG} already exists. Pick a different release bump / prerelease identifier,"
            echo "or if this is a retry of a failed run, delete the tag + draft release first:"
            echo "  gh release delete ${ACTUAL_TAG} --cleanup-tag --yes"
            exit 1
          fi
          if gh release view "$ACTUAL_TAG" >/dev/null 2>&1; then
            echo "GitHub release ${ACTUAL_TAG} already exists (likely a prior failed run)."
            echo "Delete it before retrying:  gh release delete ${ACTUAL_TAG} --cleanup-tag --yes"
            exit 1
          fi

      - name: Configure git author
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Bump root + workspace versions
        # Stable only: prerelease builds tag current HEAD without touching main,
        # so the version bump happens locally on each desktop runner instead.
        if: ${{ !inputs.prerelease }}
        env:
          ACTUAL_TAG: ${{ steps.tag.outputs.actual_tag }}
        run: |
          NEW_VERSION="${ACTUAL_TAG#v}"
          npm version "$NEW_VERSION" \
            --no-git-tag-version \
            --workspaces \
            --include-workspace-root \
            --allow-same-version

      - name: Commit, tag, push
        env:
          ACTUAL_TAG: ${{ steps.tag.outputs.actual_tag }}
          PRERELEASE: ${{ inputs.prerelease }}
          # The commit this run was dispatched against — the exact tree preflight
          # validated and that we checked out. Refuse to push if main has moved off it.
          BASE_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          if [ "$PRERELEASE" = "false" ]; then
            # Stable: commit the version bump back to main before tagging so the
            # tag points at the bumped package.json.
            git add package.json package-lock.json cli/package.json
            if git diff --staged --quiet; then
              echo "No version changes to commit (already at ${ACTUAL_TAG})."
            else
              git commit -m "chore(release): ${ACTUAL_TAG}"
            fi
            # Refuse to release unvalidated commits that landed after this run began.
            git fetch origin main
            REMOTE_MAIN="$(git rev-parse FETCH_HEAD)"
            if [ "$REMOTE_MAIN" != "$BASE_SHA" ]; then
              echo "origin/main moved from ${BASE_SHA} to ${REMOTE_MAIN}; rerun the release."
              exit 1
            fi
            git push origin HEAD:main
          fi
          # Both stable and prerelease: push the tag. Prerelease tags point at
          # the current HEAD (main stays untouched; version is set per-runner).
          git tag -a "${ACTUAL_TAG}" -m "${ACTUAL_TAG}"
          git push origin "${ACTUAL_TAG}"

      - name: Compute changelog range
        id: range
        shell: bash
        env:
          ACTUAL_TAG: ${{ steps.tag.outputs.actual_tag }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          BASE_ARGS="--strip header"
          if [ "$PRERELEASE" = "true" ]; then
            # Beta: all changes since the last tag (stable or prerelease).
            echo "args=--latest ${BASE_ARGS}" >> "$GITHUB_OUTPUT"
          else
            # Stable: base the changelog on the last *stable* tag so that all
            # changes including the beta period appear in the final release notes.
            PREV_STABLE=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' \
              | grep -v -- '-' \
              | sort -V \
              | grep -Fxv "${ACTUAL_TAG}" \
              | tail -1)
            if [ -n "$PREV_STABLE" ]; then
              echo "args=${PREV_STABLE}..${ACTUAL_TAG} ${BASE_ARGS}" >> "$GITHUB_OUTPUT"
            else
              echo "args=--latest ${BASE_ARGS}" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Generate release notes
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: ${{ steps.range.outputs.args }}
        env:
          OUTPUT: CHANGELOG.md

      - name: Generate CycloneDX SBOM
        run: |
          # --package-lock-only: read the dep graph from package-lock.json
          # instead of node_modules, so no separate prod-only install is
          # needed (and we sidestep the electron-builder postinstall issue).
          # --omit dev: keep devDeps out of the production SBOM.
          npx --yes @cyclonedx/cyclonedx-npm@2 \
            --package-lock-only --omit dev \
            --output-format JSON --output-file restura.cdx.json
          npx --yes @cyclonedx/cyclonedx-npm@2 \
            --package-lock-only --omit dev \
            --output-format XML --output-file restura.cdx.xml

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.tag.outputs.actual_tag }}
          name: ${{ steps.tag.outputs.actual_tag }}
          draft: true
          prerelease: ${{ inputs.prerelease }}
          # Release notes generated by git-cliff from conventional commits.
          # Replaces GitHub's auto-generated "What's Changed" (noisy, no categorization).
          generate_release_notes: false
          body: |
            ${{ steps.cliff.outputs.content }}

            ---
            A CycloneDX SBOM of the production dependency tree is attached
            (`restura.cdx.json` / `.xml`).
          files: |
            restura.cdx.json
            restura.cdx.xml

  desktop:
    name: Desktop installers (${{ matrix.os }})
    needs: [release]
    # Runs only after `release` succeeds (and only when the release is manually
    # dispatched), so there's never an orphan installer build.
    runs-on: ${{ matrix.os }}
    # macOS notarization is a serial Apple-side round-trip that can stall for
    # 30+ min when their notary queue is backed up; 40 was too tight and the
    # job was killed mid-notarize. Windows/Linux finish in <7 min, so the
    # higher ceiling only ever applies to a slow mac leg.
    timeout-minutes: 120
    permissions:
      # electron-builder uploads installers to the release via GH_TOKEN.
      contents: write
      # Sigstore build-provenance attestation for each installer (below).
      id-token: write
      attestations: write
    strategy:
      # One platform failing (e.g. a flaky notarization) shouldn't discard
      # installers that built cleanly on the others.
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v7
        with:
          # The freshly-pushed version-bump commit, by tag, so package.json's
          # version matches the release electron-builder publishes into.
          ref: ${{ needs.release.outputs.actual_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      # For prerelease builds the release job tags current HEAD without bumping
      # package.json on main. Set the version locally here so the packaged app
      # reports the correct version (About page, app.getVersion(), updater).
      - name: Set prerelease version locally
        if: ${{ inputs.prerelease }}
        env:
          ACTUAL_TAG: ${{ needs.release.outputs.actual_tag }}
        shell: bash
        run: |
          NEW_VERSION="${ACTUAL_TAG#v}"
          npm version "$NEW_VERSION" \
            --no-git-tag-version \
            --workspaces \
            --include-workspace-root \
            --allow-same-version

      # Inject the Sentry DSN into package.json so the packaged main process can
      # read it at runtime (electron/main/sentry.ts reads sentry.dsn). The DSN is
      # a public ingest identifier, not a secret, but we source it from a repo
      # secret to avoid hardcoding it. Skipped (Sentry disabled) when unset.
      - name: Inject Sentry DSN (optional)
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        shell: bash
        run: |
          if [ -n "${SENTRY_DSN:-}" ]; then
            npm pkg set sentry.dsn="$SENTRY_DSN"
            echo "Injected Sentry DSN into package.json."
          else
            echo "SENTRY_DSN not set — desktop build ships with Sentry disabled."
          fi

      # electron-builder's rpm target shells out to `rpmbuild`, which isn't on
      # the ubuntu-latest image by default. AppImage/deb need no extra packages.
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Build + publish installers
        env:
          # electron-builder uploads to the GitHub release matching the tag.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ---- Code signing (optional) ----
          # Set repo secrets to ship signed + notarized builds; absent → unsigned.
          # Signing is scoped PER OS: a macOS Developer ID cert is not a valid
          # Windows Authenticode cert, so CSC_LINK must NOT leak onto the Windows
          # leg (it would make signtool fail). macOS uses CSC_LINK; Windows uses
          # a separate WIN_CSC_LINK. CSC_IDENTITY_AUTO_DISCOVERY is forced off
          # when this OS has no cert so electron-builder doesn't probe a keychain.
          #   macOS  : CSC_LINK (base64 .p12), CSC_KEY_PASSWORD,
          #            APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
          #   Windows: WIN_CSC_LINK (base64 .pfx), WIN_CSC_KEY_PASSWORD
          CSC_LINK: ${{ runner.os == 'macOS' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WIN_CSC_LINK: ${{ runner.os == 'Windows' && secrets.WIN_CSC_LINK || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ runner.os == 'Windows' && secrets.WIN_CSC_KEY_PASSWORD || '' }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ (runner.os == 'macOS' && secrets.CSC_LINK != '') || (runner.os == 'Windows' && secrets.WIN_CSC_LINK != '') }}
          PRERELEASE: ${{ inputs.prerelease }}
          # Sentry source-map upload (optional). electron:publish injects debug IDs
          # into the exact bundles it ships — the only way crash stacks symbolicate.
          # Runs on every desktop OS leg; debug IDs are content-derived so re-uploads
          # dedupe. Skipped cleanly (in scripts/sentry-sourcemaps.mjs) when unset.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        shell: bash
        run: |
          if [ "$PRERELEASE" = "true" ]; then
            npm run electron:publish:prerelease
          else
            npm run electron:publish
          fi

      # Generate a signed SLSA build-provenance attestation for every installer
      # this runner produced, so consumers can verify the binaries came from
      # this workflow at this commit (`gh attestation verify <file>`). Globs
      # span all three OS targets; only the patterns matching this runner's
      # output contribute subjects, which is fine as long as at least one does.
      - name: Attest installer provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            dist/installers/*.dmg
            dist/installers/*.zip
            dist/installers/*.exe
            dist/installers/*.AppImage
            dist/installers/*.deb
            dist/installers/*.rpm

  publish-cli:
    name: Publish restura-cli to npm
    needs: [release]
    # Stable releases only — beta installers don't warrant a CLI npm publish.
    if: ${{ !inputs.prerelease }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      # Required for npm publish --provenance (signed build attestation). Only
      # works on a public repo publishing to the public npm registry — both true
      # here. Drop this and the --provenance flag below if either changes.
      id-token: write
    steps:
      - uses: actions/checkout@v7
        with:
          # The freshly-pushed version-bump commit, by tag, so cli/package.json's
          # version matches the GitHub release this run cut.
          ref: ${{ needs.release.outputs.actual_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          # Writes an .npmrc that reads the token from NODE_AUTH_TOKEN at publish.
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build CLI
        # The `cli` workspace (by dir path, so it survives a package rename).
        # Runs the workspace's prebuild (sandbox libs) + tsup bundle → cli/dist.
        run: npm run build -w cli

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret not set; stable releases must publish restura-cli."
            exit 1
          fi
          NAME="$(node -p "require('./cli/package.json').name")"
          VERSION="$(node -p "require('./cli/package.json').version")"
          # Idempotent: a re-run of an already-published version is a no-op rather
          # than a hard failure (npm view exits non-zero when the version is new).
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${NAME}@${VERSION} already on npm — skipping."
            exit 0
          fi
          npm publish -w cli --provenance --access public

  publish-docker:
    name: Publish Docker image to GHCR
    needs: [release]
    # Stable releases only, and only when opted in at dispatch (publish_docker).
    if: ${{ !inputs.prerelease && inputs.publish_docker }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      # Sigstore build-provenance attestation for the pushed image (below).
      id-token: write
      attestations: write
      # Upload the Trivy vulnerability scan to code scanning.
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.actual_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.actual_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.actual_tag }}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Scan the pushed image for known CVEs. Report-only (exit-code 0): a
      # fixable advisory in an upstream base layer shouldn't block an opt-in
      # release. ignore-unfixed drops noise we can't action; results land in the
      # Security → Code scanning tab via the SARIF upload below.
      - name: Scan image for vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy scan to code scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif
          category: trivy-image

      # Signed SLSA build-provenance for the image, pushed alongside it in GHCR.
      # Verify with `gh attestation verify oci://ghcr.io/<owner>/<repo>:<tag>`.
      - name: Attest image provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  deploy-web:
    name: Deploy web to production (Cloudflare)
    needs: [release]
    # Stable releases only — web/Cloudflare deploys do not ship beta builds.
    if: ${{ !inputs.prerelease }}
    # Production Cloudflare deploy (Worker + SPA + docs). Lives here, not in CI,
    # so it ships ONLY as part of a manually-dispatched release — never on a
    # bare merge to main. Deploys the freshly-tagged release commit.
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ needs.release.outputs.actual_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build
        env:
          VITE_WORKER_URL: https://api.restura.dev
          VITE_WORKER_PROXY_TOKEN: ${{ secrets.WORKER_PROXY_TOKEN }}
        run: npm run build

      - name: Clean stale deploy config
        run: rm -rf .wrangler/deploy

      - name: Deploy Worker (api.restura.dev)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: dist/web/restura
          command: deploy

      - name: Deploy Echo Worker (echo.restura.dev)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: echo
          command: deploy

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler pages project create restura --production-branch=main 2>&1 | tee wrangler-pages-create.log || {
            if grep -qiE 'already exists|project.*exists' wrangler-pages-create.log; then
              echo "Pages project restura already exists."
            else
              exit 1
            fi
          }

      - name: Deploy SPA to Cloudflare Pages (restura.pages.dev)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/web/client --project-name=restura --branch=main

      - name: Install docs-site dependencies
        run: npm --prefix docs-site ci --prefer-offline --no-audit --no-fund

      - name: Build docs site
        run: npm --prefix docs-site run build

      - name: Ensure docs Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          npx wrangler pages project create restura-docs --production-branch=main 2>&1 | tee wrangler-docs-pages-create.log || {
            if grep -qiE 'already exists|project.*exists' wrangler-docs-pages-create.log; then
              echo "Pages project restura-docs already exists."
            else
              exit 1
            fi
          }

      - name: Deploy docs site to Cloudflare Pages (docs.restura.dev)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs-site/dist --project-name=restura-docs --branch=main

  publish-release:
    name: Publish GitHub release
    needs: [release, desktop, publish-cli, publish-docker, deploy-web]
    # publish-docker is opt-in (publish_docker input), so 'skipped' is an acceptable
    # outcome here — only a hard 'failure'/'cancelled' should block publishing.
    if: ${{ always() && needs.release.result == 'success' && needs.desktop.result == 'success' && (inputs.prerelease || (needs.publish-cli.result == 'success' && (needs.publish-docker.result == 'success' || needs.publish-docker.result == 'skipped') && needs.deploy-web.result == 'success')) }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          ACTUAL_TAG: ${{ needs.release.outputs.actual_tag }}
        run: |
          set -euo pipefail
          # No checkout in this job, so `gh` can't infer the repo from a .git dir;
          # GH_REPO tells it explicitly (otherwise: "fatal: not a git repository").
          gh release edit "$ACTUAL_TAG" --draft=false --repo "$GH_REPO"
