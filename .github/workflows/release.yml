name: Release

# Manually dispatched — a release is NEVER cut automatically on merge to main.
# Run it from the Actions tab ("Release" → "Run workflow", on the main branch)
# or via `gh workflow run release.yml --ref main` when you want to ship.
#
# Flow:
#   1. Determine next semver from conventional-commit messages since the last
#      tag (feat → minor, feat!/BREAKING CHANGE → major, anything else → patch).
#   2. Bump root + every workspace's package.json to that version.
#   3. Commit the bump as `chore(release): vX.Y.Z` and push it back to main.
#   4. Create + push the `vX.Y.Z` tag.
#   5. Generate a CycloneDX SBOM for the production dep tree.
#   6. Cut a GitHub release with auto-generated notes + the SBOM attached.
#
# Two downstream jobs fan out from `release`, each checking out the freshly
# tagged (post-bump) commit so their package.json version matches the release:
#   - `desktop`     — build + publish the Electron installers.
#   - `publish-cli` — publish `restura-cli` to the npm registry (needs the
#                     NPM_TOKEN secret; skips cleanly if it's absent).
#
# Note: the bump commit + tag are pushed with the default GITHUB_TOKEN. Because
# the only trigger is workflow_dispatch, that push can't re-enter this workflow.

on:
  workflow_dispatch:

concurrency:
  # Never cancel an in-flight release — partial state (bumped commit without a
  # tag, or a tag without a release) is much worse than queueing.
  group: release-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Tag + release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      # Consumed by the `desktop` job so it checks out the freshly-tagged commit
      # (post version-bump) and electron-builder publishes to the matching release.
      new_tag: ${{ steps.bump.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          # full history so the bump action can read every prior tag
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine next version
        id: bump
        # anothrNick is a Docker action — Linux runners only (we're on ubuntu-latest).
        # Inputs go via env: rather than with:. Pinned to a tagged release, not @v1,
        # so we don't silently track upstream breakage.
        uses: anothrNick/github-tag-action@1.75.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: patch
          TAG_PREFIX: v
          RELEASE_BRANCHES: main
          # Let *this* workflow do the actual tag push (after the version-bump commit),
          # so we don't end up with a tag that points at the pre-bump commit.
          DRY_RUN: 'true'

      - name: Configure git author
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

      - name: Bump root + workspace versions
        env:
          # anothrNick exposes new_tag (e.g. v1.2.3) but no stripped version,
          # so we strip the prefix here for npm version.
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: |
          NEW_VERSION="${NEW_TAG#v}"
          npm version "$NEW_VERSION" \
            --no-git-tag-version \
            --workspaces \
            --include-workspace-root \
            --allow-same-version

      - name: Commit, tag, push
        env:
          NEW_TAG: ${{ steps.bump.outputs.new_tag }}
        run: |
          set -euo pipefail
          git add package.json package-lock.json cli/package.json
          if git diff --staged --quiet; then
            echo "No version changes to commit (already at ${NEW_TAG})."
          else
            git commit -m "chore(release): ${NEW_TAG}"
          fi
          # Handle the rare case where another commit landed during the run.
          git pull --rebase origin main
          git push origin HEAD:main
          git tag -a "${NEW_TAG}" -m "${NEW_TAG}"
          git push origin "${NEW_TAG}"

      - name: Generate CycloneDX SBOM
        run: |
          # --package-lock-only: read the dep graph from package-lock.json
          # instead of node_modules, so no separate prod-only install is
          # needed (and we sidestep the electron-builder postinstall issue).
          # --omit dev: keep devDeps out of the production SBOM.
          npx --yes @cyclonedx/cyclonedx-npm@2 \
            --package-lock-only --omit dev \
            --output-format JSON --output-file restura.cdx.json
          npx --yes @cyclonedx/cyclonedx-npm@2 \
            --package-lock-only --omit dev \
            --output-format XML --output-file restura.cdx.xml

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.bump.outputs.new_tag }}
          name: ${{ steps.bump.outputs.new_tag }}
          # GitHub generates "## What's Changed" + its own "**Full Changelog**"
          # link from PR history. `body` is prepended to that, so we only put
          # the bits the generator doesn't know about (SBOM attachment note).
          generate_release_notes: true
          body: |
            A CycloneDX SBOM of the production dependency tree is attached
            (`restura.cdx.json` / `.xml`).
          files: |
            restura.cdx.json
            restura.cdx.xml

  desktop:
    name: Desktop installers (${{ matrix.os }})
    needs: [release]
    # Runs only after `release` succeeds (and only when the release is manually
    # dispatched), so there's never an orphan installer build.
    runs-on: ${{ matrix.os }}
    # macOS notarization is a serial Apple-side round-trip that can stall for
    # 30+ min when their notary queue is backed up; 40 was too tight and the
    # job was killed mid-notarize. Windows/Linux finish in <7 min, so the
    # higher ceiling only ever applies to a slow mac leg.
    timeout-minutes: 120
    strategy:
      # One platform failing (e.g. a flaky notarization) shouldn't discard
      # installers that built cleanly on the others.
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          # The freshly-pushed version-bump commit, by tag, so package.json's
          # version matches the release electron-builder publishes into.
          ref: ${{ needs.release.outputs.new_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Inject the Sentry DSN into package.json so the packaged main process can
      # read it at runtime (electron/main/sentry.ts reads sentry.dsn). The DSN is
      # a public ingest identifier, not a secret, but we source it from a repo
      # secret to avoid hardcoding it. Skipped (Sentry disabled) when unset.
      - name: Inject Sentry DSN (optional)
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        shell: bash
        run: |
          if [ -n "${SENTRY_DSN:-}" ]; then
            npm pkg set sentry.dsn="$SENTRY_DSN"
            echo "Injected Sentry DSN into package.json."
          else
            echo "SENTRY_DSN not set — desktop build ships with Sentry disabled."
          fi

      # electron-builder's rpm target shells out to `rpmbuild`, which isn't on
      # the ubuntu-latest image by default. AppImage/deb need no extra packages.
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      # A tagged macOS release MUST be signed + notarized. An unsigned DMG still
      # installs, but its Keychain access can never gain a persistent ACL entry,
      # so every launch re-prompts "Restura wants to use your keychain". Signing
      # is otherwise silent-optional (absent secrets → unsigned), so fail loudly
      # here rather than publish an unsigned mac build unnoticed.
      - name: Verify macOS signing secrets are present
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
        run: |
          if [ -z "${CSC_LINK:-}" ] || [ -z "${APPLE_ID:-}" ]; then
            echo "::error::macOS release requires CSC_LINK + APPLE_ID secrets (Developer ID signing + notarization). Refusing to publish an unsigned DMG." >&2
            exit 1
          fi
          echo "macOS signing secrets present — build will be signed + notarized."

      - name: Build + publish installers
        env:
          # electron-builder uploads to the GitHub release matching the tag.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ---- Code signing (optional) ----
          # Set repo secrets to ship signed + notarized builds; absent → unsigned.
          # Signing is scoped PER OS: a macOS Developer ID cert is not a valid
          # Windows Authenticode cert, so CSC_LINK must NOT leak onto the Windows
          # leg (it would make signtool fail). macOS uses CSC_LINK; Windows uses
          # a separate WIN_CSC_LINK. CSC_IDENTITY_AUTO_DISCOVERY is forced off
          # when this OS has no cert so electron-builder doesn't probe a keychain.
          #   macOS  : CSC_LINK (base64 .p12), CSC_KEY_PASSWORD,
          #            APPLE_ID, APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
          #   Windows: WIN_CSC_LINK (base64 .pfx), WIN_CSC_KEY_PASSWORD
          CSC_LINK: ${{ runner.os == 'macOS' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ runner.os == 'macOS' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          WIN_CSC_LINK: ${{ runner.os == 'Windows' && secrets.WIN_CSC_LINK || '' }}
          WIN_CSC_KEY_PASSWORD: ${{ runner.os == 'Windows' && secrets.WIN_CSC_KEY_PASSWORD || '' }}
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ (runner.os == 'macOS' && secrets.CSC_LINK != '') || (runner.os == 'Windows' && secrets.WIN_CSC_LINK != '') }}
        run: npm run electron:publish

  publish-cli:
    name: Publish restura-cli to npm
    needs: [release]
    # Runs only after a successful manually-dispatched `release`.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      # Required for npm publish --provenance (signed build attestation). Only
      # works on a public repo publishing to the public npm registry — both true
      # here. Drop this and the --provenance flag below if either changes.
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          # The freshly-pushed version-bump commit, by tag, so cli/package.json's
          # version matches the GitHub release this run cut.
          ref: ${{ needs.release.outputs.new_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          # Writes an .npmrc that reads the token from NODE_AUTH_TOKEN at publish.
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build CLI
        # The `cli` workspace (by dir path, so it survives a package rename).
        # Runs the workspace's prebuild (sandbox libs) + tsup bundle → cli/dist.
        run: npm run build -w cli

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "NPM_TOKEN secret not set — skipping CLI publish."
            exit 0
          fi
          NAME="$(node -p "require('./cli/package.json').name")"
          VERSION="$(node -p "require('./cli/package.json').version")"
          # Idempotent: a re-run of an already-published version is a no-op rather
          # than a hard failure (npm view exits non-zero when the version is new).
          if npm view "${NAME}@${VERSION}" version >/dev/null 2>&1; then
            echo "${NAME}@${VERSION} already on npm — skipping."
            exit 0
          fi
          npm publish -w cli --provenance --access public

  publish-docker:
    name: Publish Docker image to GHCR
    needs: [release]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.new_tag }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.release.outputs.new_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.release.outputs.new_tag }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-web:
    name: Deploy web to production (Cloudflare)
    needs: [release]
    # Production Cloudflare deploy (Worker + SPA + docs). Lives here, not in CI,
    # so it ships ONLY as part of a manually-dispatched release — never on a
    # bare merge to main. Deploys the freshly-tagged release commit.
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.new_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_WORKER_URL: https://api.restura.dev
          VITE_WORKER_PROXY_TOKEN: ${{ secrets.WORKER_PROXY_TOKEN }}
        run: npm run build

      - name: Clean stale deploy config
        run: rm -rf .wrangler/deploy

      - name: Deploy Worker (api.restura.dev)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: dist/web/restura
          command: deploy

      - name: Deploy Echo Worker (echo.restura.dev)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: echo
          command: deploy

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages project create restura --production-branch=main || true

      - name: Deploy SPA to Cloudflare Pages (restura.pages.dev)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/web/client --project-name=restura --branch=main

      - name: Install docs-site dependencies
        run: npm --prefix docs-site ci

      - name: Build docs site
        run: npm --prefix docs-site run build

      - name: Ensure docs Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages project create restura-docs --production-branch=main || true

      - name: Deploy docs site to Cloudflare Pages (docs.restura.dev)
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs-site/dist --project-name=restura-docs --branch=main

  sentry-sourcemaps:
    name: Upload Electron source maps to Sentry
    needs: [release]
    # Single run (NOT per-OS): the renderer + main JS maps are platform-identical,
    # so uploading once with the release version is enough — the `desktop` matrix
    # must not upload the same maps three times. Skips cleanly when SENTRY_AUTH_TOKEN
    # is unset, so the release isn't blocked before a Sentry project is provisioned.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.new_tag }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Produce both map sets: hidden renderer maps (dist/web) + main-process
      # maps (dist/electron). These are the same artifacts the desktop job builds.
      - name: Build renderer + main (with source maps)
        run: |
          npm run electron:build:web
          npm run electron:compile

      - name: Inject + upload source maps
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          NEW_TAG: ${{ needs.release.outputs.new_tag }}
        run: |
          set -euo pipefail
          if [ -z "${SENTRY_AUTH_TOKEN:-}" ]; then
            echo "SENTRY_AUTH_TOKEN not set — skipping source map upload."
            exit 0
          fi
          # Must match the SDK's release: `restura@<version>` (electron/main/sentry.ts).
          RELEASE="restura@${NEW_TAG#v}"
          # NOTE: this job builds its own copy of the bundles to upload maps. The
          # `desktop` matrix ships a separate build, so symbolication relies on
          # release+filename matching being identical across the two builds (same
          # tag, same `npm ci`). When a DSN is provisioned, verify a real crash
          # symbolicates; if it doesn't, move `sourcemaps inject` into the desktop
          # build (inject on every OS leg, upload once) so the shipped JS carries
          # the debug IDs.
          npx @sentry/cli sourcemaps inject dist/web dist/electron
          npx @sentry/cli sourcemaps upload --release "$RELEASE" dist/web dist/electron
