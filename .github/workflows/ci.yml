name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Type-check, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (renderer + Electron main)
        run: |
          npm run type-check
          npx tsc --noEmit -p electron/tsconfig.json

      - name: Type-check (worker)
        run: npx tsc --noEmit -p worker/tsconfig.json

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=critical

      - name: Run tests
        run: npm run test:run

      - name: Build renderer
        run: npm run build

      - name: Build Electron main
        run: npm run electron:compile
