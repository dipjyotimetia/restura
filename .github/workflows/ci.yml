name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Type-check, lint, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      # Needed to post/update the test-results comment on the PR.
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund${{ github.actor == 'dependabot[bot]' && ' --ignore-scripts' || '' }}

      - name: Type-check (all projects)
        # Single source of truth for the project set — same six tsc projects
        # `npm run validate` runs locally. Keep this in sync via type-check:all only.
        run: npm run type-check:all

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Verify generated opencollection types are up-to-date
        run: npm run verify:opencollection-types

      - name: Verify capability matrix is up-to-date
        run: npm run capabilities:check

      # Dependency auditing moved to the scheduled, non-blocking security-audit
      # workflow. A newly-disclosed transitive critical advisory used to fail
      # `validate` on every unrelated PR (blocking all merges until patched);
      # dependabot security PRs remain the remediation path.

      - name: Run tests with coverage
        # `electron`'s package index.js calls `downloadElectron()` at
        # module-load time when `path.txt` is missing. On GitHub-hosted runners
        # the postinstall download intermittently exits 0 without writing
        # `path.txt`, then EVERY test that `import 'electron'` (six suites)
        # crashes on module load with ENOENT — even though those tests
        # `vi.mock('electron')` and never touch the real binary. Setting
        # ELECTRON_OVERRIDE_DIST_PATH short-circuits the download check in
        # `node_modules/electron/index.js`: the module returns a stub path and
        # the test's mock takes over from there. Local dev is unaffected.
        #
        # `test:ci` runs the full coverage report but disables the threshold
        # gate. Coverage tracking is a visibility feature here, not a CI gate
        # — devs who run `npm run test:coverage` locally still get strict
        # threshold enforcement.
        id: tests
        env:
          ELECTRON_OVERRIDE_DIST_PATH: /tmp
        # Emit JUnit XML (unit + integration — vitest's `include` already covers
        # tests/contract + tests/security) alongside the console reporter so the
        # next step can summarize results on the PR.
        run: npm run test:ci -- --reporter=default --reporter=junit --outputFile.junit=test-results/junit.xml

      - name: Comment test results on PR
        # Parses the JUnit report and upserts a single PR comment with separate
        # Unit vs Integration totals (suites under tests/** are integration —
        # contract + security; everything else is unit). Runs on both pass and
        # fail, only when the test step actually executed (so the file exists).
        # Reads only our own report — no untrusted input flows into the script.
        # Same-repo only: forked PRs get a read-only GITHUB_TOKEN (the job's
        # `pull-requests: write` is silently ignored), so createComment would 403
        # and fail an otherwise-green run. External PRs simply skip the comment.
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' && (steps.tests.outcome == 'success' || steps.tests.outcome == 'failure') }}
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const MARKER = '<!-- restura-test-results -->';
            let xml;
            try {
              xml = fs.readFileSync('test-results/junit.xml', 'utf8');
            } catch {
              core.warning('No JUnit report found; skipping test-results comment.');
              return;
            }
            const cats = {
              unit: { tests: 0, failures: 0, errors: 0, skipped: 0, time: 0 },
              integration: { tests: 0, failures: 0, errors: 0, skipped: 0, time: 0 },
            };
            const attr = (tag, name) => {
              const m = tag.match(new RegExp(`${name}="([^"]*)"`));
              return m ? Number(m[1]) || 0 : 0;
            };
            // <testsuite> elements don't nest in JUnit, so each opening tag is one suite.
            for (const tag of xml.match(/<testsuite\b[^>]*>/g) || []) {
              const name = (tag.match(/name="([^"]*)"/) || [])[1] || '';
              const cat = name.startsWith('tests/') ? cats.integration : cats.unit;
              cat.tests += attr(tag, 'tests');
              cat.failures += attr(tag, 'failures');
              cat.errors += attr(tag, 'errors');
              cat.skipped += attr(tag, 'skipped');
              cat.time += attr(tag, 'time');
            }
            const total = {};
            for (const k of ['tests', 'failures', 'errors', 'skipped', 'time']) {
              total[k] = cats.unit[k] + cats.integration[k];
            }
            const row = (label, c) => {
              const passed = c.tests - c.failures - c.errors - c.skipped;
              return `| ${label} | ${passed} | ${c.failures + c.errors} | ${c.skipped} | ${c.tests} | ${c.time.toFixed(1)}s |`;
            };
            const failed = total.failures + total.errors > 0;
            const body = [
              MARKER,
              `## ${failed ? '❌' : '✅'} Test results`,
              '',
              '| Category | ✅ Passed | ❌ Failed | ⏭️ Skipped | Total | Time |',
              '| --- | ---: | ---: | ---: | ---: | ---: |',
              row('Unit', cats.unit),
              row('Integration', cats.integration),
              row('**Total**', total),
              '',
              `<sub>Commit ${context.sha.slice(0, 7)} · integration = tests/ (contract + security), unit = all other suites</sub>`,
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });
            const existing = comments.find((c) => c.body && c.body.includes(MARKER));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }

      - name: Vitest Coverage Report
        # Same-repo only — posts a PR comment, so it 403s on forked PRs (read-only
        # token). The coverage artifact upload below still runs for every PR.
        if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' && (steps.tests.outcome == 'success' || steps.tests.outcome == 'failure') }}
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 14

      - name: Build renderer
        run: npm run build

      - name: Build Electron main
        run: npm run electron:compile

      - name: Check bundle size
        run: npm run size

      # The cli workspace has its own vitest suite that root `test:ci` does not
      # cover (root vitest `include` omits cli/**). Gate it here so a published
      # `restura-cli` regression can't slip through. `pretest` regenerates the
      # sandbox bundle on a clean checkout.
      - name: Run CLI tests
        run: npm run --workspace cli test

      # The vscode-extension workspace has its own vitest suite that root
      # `test:ci` does not cover (root vitest `include` omits the workspace).
      # It bundles shared/protocol + opencollection, so running it on every PR
      # (not only when vscode-extension/** changes) also catches breakage that a
      # shared-code change would introduce. Fast + wasm-free, no prebuild needed.
      - name: Run VS Code extension unit tests
        run: npm run --workspace vscode-extension test:unit

  electron-smoke:
    name: Electron pack smoke (${{ matrix.os }})
    # Skip for Dependabot: this job needs the `electron-builder install-app-deps`
    # postinstall (native rebuild), which the Dependabot runs deliberately skip
    # via --ignore-scripts. Electron dep bumps still get desktop coverage at
    # release-preflight time. Not a required check, so skipping never blocks merge.
    if: ${{ github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' }}
    needs: [validate]
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund${{ github.actor == 'dependabot[bot]' && ' --ignore-scripts' || '' }}

      - name: Generate icons
        # Produces icon.ico (Windows) / icon.icns / PNGs from icon.svg. The .ico
        # is referenced by electron-builder.json and isn't committed, so the
        # Windows pack needs this step.
        run: npm run electron:icons

      - name: Compile Electron main
        run: npm run electron:compile

      - name: Build renderer (Electron mode)
        env:
          VITE_IS_ELECTRON_BUILD: 'true'
        run: npm run electron:build:web

      - name: Pack unsigned (smoke only)
        env:
          # Skip signing/notarization for smoke; this catches packaging regressions
          # without needing certs in CI.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --dir --publish never

      - name: Verify renderer is bundled into the app
        # Guards against dist/web layout / files-glob drift that would otherwise
        # ship an app that launches to a blank window. The verifier normalizes
        # path separators so it works on Windows (listPackage returns backslash
        # paths there). See scripts/verify-asar-renderer.mjs.
        shell: bash
        run: |
          set -euo pipefail
          asar=$(find dist/installers -name app.asar -print -quit)
          if [ -z "$asar" ]; then echo "::error::app.asar not found"; exit 1; fi
          node scripts/verify-asar-renderer.mjs "$asar"

  e2e:
    if: github.event_name == 'pull_request'
    # Two shards run in parallel on separate runners — each boots its own dev
    # server, so playwright.config.ts's `workers: 1` / `fullyParallel: false`
    # (which keeps suites within a shard from racing on shared dev-server
    # state) remains correct.
    name: Playwright E2E (shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund${{ github.actor == 'dependabot[bot]' && ' --ignore-scripts' || '' }}

      # Pin the Playwright browser cache to the package-lock so a version bump
      # invalidates it automatically and we don't run on stale binaries.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium + system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # Browsers are cached but the OS-level libs aren't — rerun the deps step
      # on cache hit too. `--with-deps` is idempotent and fast when libs exist.
      - name: Install Chromium system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright shard
        run: npm run test:e2e -- --shard=${{ matrix.shard }}/2

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: playwright-report/
          retention-days: 14

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results-shard-${{ matrix.shard }}
          path: test-results/
          retention-days: 7

  e2e-extension:
    if: github.event_name == 'pull_request'
    # Browser capture extension: builds the MV3 bundle (an explicit build gate —
    # the only place `extension/`'s vite build is exercised) and runs its e2e in
    # a real Chromium persistent context with the unpacked extension loaded. Uses
    # the standalone playwright.extension.config.ts (no dev server) and so is kept
    # off the web `e2e` shards, which boot `npm run dev`.
    name: Extension build + E2E
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund${{ github.actor == 'dependabot[bot]' && ' --ignore-scripts' || '' }}

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium + system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Chromium system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Explicit build gate: fail the job if the extension bundle doesn't build,
      # independent of the e2e (which would otherwise self-build in beforeAll).
      - name: Build extension
        run: npm run build --workspace @restura/extension

      - name: Run extension E2E
        run: npx playwright test --config=playwright.extension.config.ts

      - name: Upload extension test traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-extension-test-results
          path: test-results/
          retention-days: 7

  e2e-electron:
    # Skip for Dependabot (see electron-smoke): needs the native-rebuild
    # postinstall that --ignore-scripts skips on Dependabot runs.
    if: ${{ github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' }}
    # Desktop e2e: launches the compiled, unpacked app via Playwright's
    # `_electron` API (no electron-builder packaging, no Vite dev server). The
    # specs spin up in-process mock upstreams + a spawned native gRPC server,
    # so no docker/brokers are needed. Kept off the web `e2e` job because it
    # builds a different target (electron:compile, not the SPA + Worker) and
    # needs a virtual display.
    name: Electron desktop E2E
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund${{ github.actor == 'dependabot[bot]' && ' --ignore-scripts' || '' }}

      # Electron bundles Chromium, so it needs the same shared system libs
      # (libnss3, libgbm, libatk, GTK, …). `playwright install-deps chromium`
      # installs exactly that set without downloading a browser binary — the
      # `_electron` runner uses the `electron` npm binary, not Playwright's.
      - name: Install Electron runtime system deps
        run: npx playwright install-deps chromium

      - name: Build desktop app (renderer + main)
        run: npm run test:e2e:electron:build

      # Fail fast with a clear message if the electron binary didn't install.
      # `_electron.launch` resolves it via `require('electron')`, which reads the
      # path.txt that electron's postinstall download intermittently fails to
      # write on GitHub runners — without this, a missing binary surfaces as an
      # opaque launch timeout instead.
      - name: Verify electron binary is resolvable
        run: node -e "const p=require('electron'); if(typeof p!=='string'){throw new Error('electron binary path unresolved')} console.log('electron at', p)"

      # Headless runner has no display server; Electron needs one to open its
      # BrowserWindow. xvfb-run provides a virtual framebuffer.
      - name: Run Electron e2e
        run: xvfb-run -a npm run test:e2e:electron

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: electron-e2e-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

  vscode-extension-e2e:
    # The extension's @vscode/test-cli suite launches a real VS Code (Electron)
    # host to verify activation, command registration, and live diagnostics —
    # coverage the renderer unit tests can't give. Kept off the validate job
    # because it needs a VS Code download + a virtual display. Not a required
    # check, so a flaky download never blocks merge.
    name: VS Code extension integration
    if: ${{ github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' }}
    needs: [validate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build extension bundle
        # @vscode/test-cli loads dist `out/extension.js` as the dev extension.
        run: npm run --workspace vscode-extension build

      # VS Code is Electron/Chromium, so it needs the same shared system libs
      # (libnss3, libgbm, GTK, …) as the Electron e2e job. `playwright
      # install-deps chromium` installs exactly that set without a browser binary.
      - name: Install VS Code runtime system deps
        run: npx playwright install-deps chromium

      # Cache the downloaded VS Code test build (~260 MB) so reruns skip the
      # fetch; keyed on the lockfile so a @vscode/test-electron bump invalidates it.
      - name: Cache VS Code test build
        uses: actions/cache@v5.0.5
        with:
          path: vscode-extension/.vscode-test
          key: ${{ runner.os }}-vscode-test-${{ hashFiles('package-lock.json') }}

      # Headless runner has no display; the VS Code Electron host needs one.
      - name: Run extension integration tests (xvfb)
        run: xvfb-run -a npm run --workspace vscode-extension test:integration

  # Production deploy lives in release.yml (the manually-dispatched Release
  # workflow) — it is NOT run on merge to main. PR preview deploys stay here.

  deploy-preview:
    name: Deploy preview
    needs: [validate, e2e]
    # Same-repo PRs only. Forked PRs receive neither the Cloudflare secrets nor a
    # writable token, so every step here would fail — skip the job for forks.
    # Dependabot is also excluded: its runs get no secrets (deploy would fail)
    # and a preview deploy of a dep bump has no value.
    if: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund${{ github.actor == 'dependabot[bot]' && ' --ignore-scripts' || '' }}

      - name: Build
        env:
          VITE_WORKER_URL: https://api.restura.dev
          VITE_WORKER_PROXY_TOKEN: ${{ secrets.WORKER_PROXY_TOKEN }}
        run: npm run build

      - name: Clean stale deploy config
        run: rm -rf .wrangler/deploy

      - name: Deploy Worker preview version
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: dist/web/restura
          command: versions upload

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages project create restura --production-branch=main || true

      # Sanitize head_ref before passing to wrangler-action. The action templates
      # `command` into a shell invocation, and branch refs allow shell metachars
      # (`;`, `$`, backticks, etc.) — a malicious fork could open a PR whose
      # branch name is a payload. Refuse anything outside [a-zA-Z0-9._/-] and
      # cap to 64 chars (Cloudflare Pages branch alias limit).
      - name: Sanitize preview branch slug
        id: branch
        env:
          RAW_REF: ${{ github.head_ref }}
        run: |
          set -euo pipefail
          if [[ ! "$RAW_REF" =~ ^[a-zA-Z0-9._/-]{1,64}$ ]]; then
            echo "::error::Refusing to deploy preview for unsafe head_ref: $RAW_REF"
            exit 1
          fi
          # Pages doesn't allow leading dashes or slashes; double-check.
          case "$RAW_REF" in
            -*|/*) echo "::error::Branch ref cannot start with - or /"; exit 1 ;;
          esac
          echo "slug=$RAW_REF" >> "$GITHUB_OUTPUT"

      - name: Deploy SPA preview to Cloudflare Pages
        id: preview
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/web/client --project-name=restura --branch=${{ steps.branch.outputs.slug }}

      - name: Install docs-site dependencies
        run: npm --prefix docs-site ci --prefer-offline --no-audit --no-fund${{ github.actor == 'dependabot[bot]' && ' --ignore-scripts' || '' }}

      - name: Build docs site
        run: npm --prefix docs-site run build

      - name: Ensure docs Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages project create restura-docs --production-branch=main || true

      - name: Deploy docs site preview to Cloudflare Pages
        id: docs-preview
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs-site/dist --project-name=restura-docs --branch=${{ steps.branch.outputs.slug }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.deployment-url }}
        with:
          script: |
            const rawUrl = process.env.PREVIEW_URL || '';
            let body = 'Pages preview deployed (check the Actions log for the URL).';
            if (rawUrl) {
              try {
                const url = new URL(rawUrl);
                if (url.protocol !== 'https:' || !url.hostname.endsWith('.pages.dev')) {
                  throw new Error('Unexpected preview URL host');
                }
                body = `Pages preview deployed: ${url.toString()}`;
              } catch (error) {
                body = 'Pages preview deployed, but the URL output was invalid (check the Actions log).';
              }
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # docs-site is NOT an npm workspace (it has its own package-lock.json), so the
  # `validate` job above never touches it. Gate its type-check + build here on
  # every PR/push — including forks — so doc changes can't silently break the
  # site. (`deploy-preview` only builds docs on same-repo PRs, after e2e.)
  docs:
    name: Docs site (type-check + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs-site dependencies
        run: npm --prefix docs-site ci --prefer-offline --no-audit --no-fund${{ github.actor == 'dependabot[bot]' && ' --ignore-scripts' || '' }}

      - name: Type-check docs (astro check)
        run: npm --prefix docs-site run check

      - name: Build docs
        run: npm --prefix docs-site run build
