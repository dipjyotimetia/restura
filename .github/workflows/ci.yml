name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Type-check, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (renderer + Electron main)
        run: |
          npm run type-check
          npx tsc --noEmit -p electron/tsconfig.json

      - name: Type-check (worker)
        run: npx tsc --noEmit -p worker/tsconfig.json

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=critical

      - name: Run tests
        run: npm run test:run

      - name: Build renderer
        run: npm run build

      - name: Build Electron main
        run: npm run electron:compile

  e2e:
    if: github.event_name == 'pull_request'
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Pin the Playwright browser cache to the package-lock so a version bump
      # invalidates it automatically and we don't run on stale binaries.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium + system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      # Browsers are cached but the OS-level libs aren't — rerun the deps step
      # on cache hit too. `--with-deps` is idempotent and fast when libs exist.
      - name: Install Chromium system deps (cache hit path)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run Playwright suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-test-results
          path: test-results/
          retention-days: 7

  deploy:
    name: Deploy (production)
    needs: [validate]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_WORKER_URL: https://api.restura.dev
          VITE_WORKER_PROXY_TOKEN: ${{ secrets.WORKER_PROXY_TOKEN }}
        run: npm run build

      - name: Clean stale deploy config
        run: rm -rf .wrangler/deploy

      - name: Deploy Worker (api.restura.dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: dist/web/restura
          command: deploy

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages project create restura --production-branch=main || true

      - name: Deploy SPA to Cloudflare Pages (restura.pages.dev)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/web/client --project-name=restura --branch=main

  deploy-preview:
    name: Deploy preview
    needs: [validate, e2e]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_WORKER_URL: https://api.restura.dev
          VITE_WORKER_PROXY_TOKEN: ${{ secrets.WORKER_PROXY_TOKEN }}
        run: npm run build

      - name: Clean stale deploy config
        run: rm -rf .wrangler/deploy

      - name: Deploy Worker preview version
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: dist/web/restura
          command: versions upload

      - name: Ensure Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages project create restura --production-branch=main || true

      - name: Deploy SPA preview to Cloudflare Pages
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/web/client --project-name=restura --branch=${{ github.head_ref }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.deployment-url }}
        with:
          script: |
            const rawUrl = process.env.PREVIEW_URL || '';
            let body = 'Pages preview deployed (check the Actions log for the URL).';
            if (rawUrl) {
              try {
                const url = new URL(rawUrl);
                if (url.protocol !== 'https:' || !url.hostname.endsWith('.pages.dev')) {
                  throw new Error('Unexpected preview URL host');
                }
                body = `Pages preview deployed: ${url.toString()}`;
              } catch (error) {
                body = 'Pages preview deployed, but the URL output was invalid (check the Actions log).';
              }
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
