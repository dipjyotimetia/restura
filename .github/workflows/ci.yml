name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Type-check, lint, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (renderer + Electron main)
        run: |
          npm run type-check
          npx tsc --noEmit -p electron/tsconfig.json

      - name: Type-check (worker)
        run: npx tsc --noEmit -p worker/tsconfig.json

      - name: Lint
        run: npm run lint

      - name: Security audit
        run: npm audit --audit-level=critical

      - name: Run tests
        run: npm run test:run

      - name: Build renderer
        run: npm run build

      - name: Build Electron main
        run: npm run electron:compile

  deploy:
    name: Deploy to Cloudflare Pages (production)
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/web --project-name=restura --branch=main

  deploy-preview:
    name: Deploy preview to Cloudflare Pages
    needs: validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-preview-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy preview
        id: preview
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist/web --project-name=restura --branch=${{ github.head_ref }}

      - name: Comment preview URL on PR
        uses: actions/github-script@v9
        with:
          script: |
            const url = '${{ steps.preview.outputs.deployment-url }}';
            const body = url
              ? `Cloudflare Pages preview deployed: ${url}`
              : 'Cloudflare Pages preview deployed (check the Actions log for the URL).';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
