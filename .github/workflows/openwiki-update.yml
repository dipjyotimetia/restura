name: OpenWiki Update

# Scheduled agent-facing documentation: OpenWiki (langchain-ai/openwiki) walks
# the commits since its last run, diffs what changed, and opens a PR updating
# the openwiki/ directory — docs written for coding agents to reference, not
# end users (see docs/CI_CD.md for the human-facing docs pipeline). Runs
# against OpenRouter so no direct OpenAI/Anthropic account is required.

on:
  workflow_dispatch:
  schedule:
    # GitHub schedules use UTC; 08:00 UTC is midnight PST.
    - cron: "0 8 * * *"

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    name: Generate OpenWiki update PR
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: true

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install OpenWiki
        run: npm install --global openwiki

      - name: Run OpenWiki
        run: openwiki --update --print
        env:
          # OpenRouter is the only configured provider — swap this block to
          # point at OpenAI/Anthropic/Fireworks/Baseten instead. See
          # https://github.com/langchain-ai/openwiki for the full provider list.
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENWIKI_MODEL_ID: z-ai/glm-5.2

      - name: Create OpenWiki update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: openwiki
          branch: openwiki/update
          commit-message: "docs: update OpenWiki"
          title: "docs: update OpenWiki"
          body: |
            Automated OpenWiki documentation update.

            Generated by the scheduled [OpenWiki](https://github.com/langchain-ai/openwiki) workflow.
