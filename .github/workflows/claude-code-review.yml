name: Claude Code Review

# Automatic AI review on every PR. Uses track_progress for a live checklist
# comment. Requires the ANTHROPIC_API_KEY repo secret.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

jobs:
  review:
    # Skip drafts — review once the PR is ready.
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude code review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Live progress checklist comment on the PR.
          track_progress: true

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR for the Restura codebase — a multi-protocol API client
            (HTTP/REST, GraphQL, gRPC, WebSocket, Socket.IO, SSE, Kafka, MCP) that
            ships ONE React renderer to three targets: a Cloudflare Pages/Workers
            web app, a self-hosted Node/Docker server, and an Electron desktop app.
            See CLAUDE.md for architecture. Focus your review on:

            1. **Cross-platform correctness** — the renderer is shared across web,
               Node, and Electron. Flag changes that assume one platform's transport,
               break `isElectron()` branching, or diverge web vs. desktop behaviour.
               Capability differences must be reflected in `src/lib/shared/capabilities.ts`.

            2. **Backend-agnostic protocol core** — `shared/protocol/` must stay free
               of Node/Electron/Cloudflare specifics. Platform code belongs in the
               Worker handlers or Electron main handlers, not in `shared/`.

            3. **Security** — SSRF guards (`shared/protocol/url-validation.ts`),
               header sanitisation, IPC input validation/rate-limiting at the Electron
               boundary, wire-level auth signing, and `SecretRef` handling (secrets must
               never reach the renderer store, persistence, exports, or logs — ADR-0007).

            4. **State & persistence** — Zustand stores validated by Zod
               (`store-validators.ts`); no new `window.localStorage` usage.

            5. **Code quality & tests** — strict TS (noUncheckedIndexedAccess etc.),
               error handling, edge cases, adequate test coverage, and whether generated
               artifacts (opencollection types, capability matrix) are regenerated.

            Use inline comments for specific issues and a top-level comment for general
            observations. Be concise; prioritise correctness and security over style.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
