name: SBOM

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    name: Generate CycloneDX SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies (production only)
        run: npm ci --omit=dev

      - name: Generate CycloneDX SBOM
        run: |
          npx --yes @cyclonedx/cyclonedx-npm@2 \
            --output-format JSON \
            --output-file restura.cdx.json
          npx --yes @cyclonedx/cyclonedx-npm@2 \
            --output-format XML \
            --output-file restura.cdx.xml

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            restura.cdx.json
            restura.cdx.xml
          retention-days: 90

      - name: Attach SBOM to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            restura.cdx.json
            restura.cdx.xml
