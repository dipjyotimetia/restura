name: Security Audit

# Non-blocking dependency audit. Runs on a schedule (and on demand) instead of in
# CI's `validate` job so a newly-disclosed transitive critical advisory reports
# here rather than failing every unrelated PR and blocking all merges. Dependabot
# security PRs remain the remediation path; this is the visibility net.

on:
  schedule:
    # Mondays 00:00 UTC — weekly, ahead of the Tuesday dependabot npm run.
    - cron: '0 0 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  audit:
    name: npm audit (critical)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Audit production + dev dependencies (critical)
        run: npm audit --audit-level=critical
