name: CodeQL

# Static analysis (SAST) via GitHub CodeQL. Scans the application source
# (TypeScript/JavaScript) and the workflow files themselves (the `actions`
# language catches things like unpinned/injectable workflow inputs). Findings
# surface in the repo's Security → Code scanning tab and annotate PRs.
#
# Runs on PRs and pushes to main (catch regressions at review time) plus a
# weekly schedule (so newly-added CodeQL queries re-flag old code). This is a
# standalone workflow — it runs in parallel with CI and does not gate it; wire
# it into branch protection ("CodeQL / Analyze") if you want it required.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 03:27 UTC — offset from the other scheduled jobs to spread load.
    - cron: '27 3 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      # Upload analysis results to the code-scanning API.
      security-events: write
      # Read the Actions metadata CodeQL needs to map alerts back to runs.
      actions: read
    strategy:
      fail-fast: false
      matrix:
        # Both are interpreted — no compiler — so build-mode: none is correct
        # and avoids a redundant autobuild pass.
        language: [javascript-typescript, actions]
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: none
          # security-extended adds the deeper security queries on top of the
          # default set (more coverage, security-only — no code-quality noise).
          queries: security-extended

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'
