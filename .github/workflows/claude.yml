name: Claude Code

# Interactive assistant: mention @claude in an issue, PR, or review comment and
# Claude will respond — answer questions, implement changes, open commits/PRs.
# Requires the ANTHROPIC_API_KEY repo secret.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

          # Restura validation commands are pre-approved so Claude can verify
          # its own changes (see CLAUDE.md "Full validation" / Testing).
          claude_args: |
            --allowedTools "Bash(npm ci),Bash(npm run build),Bash(npm run type-check),Bash(npm run lint),Bash(npm run lint:fix),Bash(npm run test:run),Bash(npm run validate),Bash(npx tsc:*),Bash(npx vitest:*)"
