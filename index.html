<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <meta name="theme-color" content="#2e91ff" />
    <meta name="color-scheme" content="dark light" />
    <link rel="canonical" href="https://restura.dev/" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="application-name" content="Restura" />
    <meta name="creator" content="Restura" />
    <meta name="publisher" content="Restura" />
    <meta
      name="description"
      content="A modern API client for testing HTTP, GraphQL, gRPC, and WebSocket endpoints. Features include collections, environments, pre-request scripts, and code generation."
    />
    <meta
      name="keywords"
      content="API testing, HTTP client, GraphQL, gRPC, WebSocket, REST API, API development, gRPC client, GraphQL client"
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://restura.dev/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="Restura" />
    <meta property="og:title" content="Restura - Multi-Protocol API Testing Tool" />
    <meta
      property="og:description"
      content="A modern API client for testing HTTP, GraphQL, gRPC, and WebSocket endpoints. Features collections, environments, pre-request scripts, and code generation."
    />
    <meta property="og:image" content="https://restura.dev/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Restura - Multi-Protocol API Testing Tool" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@restura_dev" />
    <meta name="twitter:title" content="Restura - Multi-Protocol API Testing Tool" />
    <meta
      name="twitter:description"
      content="A modern API client for testing HTTP, GraphQL, gRPC, and WebSocket endpoints."
    />
    <meta name="twitter:image" content="https://restura.dev/og-image.png" />
    <title>Restura - Multi-Protocol API Testing Tool</title>
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Restura",
        "applicationCategory": "DeveloperApplication",
        "operatingSystem": "Web, Windows, macOS, Linux",
        "url": "https://restura.dev",
        "description": "A modern multi-protocol API client for testing HTTP, GraphQL, gRPC, and WebSocket endpoints.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "HTTP/REST API testing",
          "GraphQL client",
          "gRPC client",
          "WebSocket testing",
          "Request collections",
          "Environment variables",
          "Pre-request scripts",
          "Code generation"
        ]
      }
    </script>
  </head>
  <body class="antialiased">
    <div id="root">
      <!-- First-paint brand splash. React clears #root on mount, so this shows
           only until the SPA hydrates. Inline + self-contained (no CSS deps) —
           it cannot import brandMark.json before paint, so the mark geometry/
           gradient below are hand-copied from it; keep in sync. -->
      <div
        id="app-splash"
        style="
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #0e1117;
        "
      >
        <svg
          width="76"
          height="76"
          viewBox="0 0 32 32"
          role="img"
          aria-label="Restura"
          style="border-radius: 17px; animation: app-splash-pulse 1.4s ease-in-out infinite"
        >
          <defs>
            <linearGradient id="splash-grad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#127eee" />
              <stop offset="100%" stop-color="#53a6ff" />
            </linearGradient>
          </defs>
          <rect width="32" height="32" rx="7" fill="url(#splash-grad)" />
          <g
            stroke="#fff"
            stroke-width="3.8"
            stroke-linecap="round"
            stroke-linejoin="round"
            fill="none"
          >
            <path d="M11 6.5 V25.5" />
            <path d="M11 6.5 H18 Q22 6.5 22 10.4 L22 11.9 Q22 15.8 18 15.8 H11" />
            <path d="M11 15.8 L21 25.5" />
          </g>
        </svg>
      </div>
      <style>
        @keyframes app-splash-pulse {
          0%,
          100% {
            opacity: 0.55;
          }
          50% {
            opacity: 1;
          }
        }
        @media (prefers-reduced-motion: reduce) {
          #app-splash svg {
            animation: none !important;
          }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
